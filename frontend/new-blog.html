<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07070b" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='10' fill='%23121218'/%3E%3Ctext x='20' y='26' font-family='sans-serif' font-size='15' font-weight='700' fill='%232f7dfd' text-anchor='middle'%3EOM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>New Blog Post — Olamide Miracle</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/public.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/blog.css" />
</head>
<body>
  <!-- Shown until the auth check resolves, so protected content never flashes -->
  <div class="dash-loading" id="authGate">
    <span class="spinner"></span> checking session…
  </div>

  <div id="pageRoot" hidden>
    <header class="dash-header">
      <div class="dash-header__inner">
        <a href="dashboard.html" class="brand">
          <svg class="brand__logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Olamide Miracle logo">
            <rect x="1" y="1" width="38" height="38" rx="10" fill="#121218" stroke="#2f7dfd" stroke-width="1.5" />
            <text x="20" y="26" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" fill="#2f7dfd" text-anchor="middle">OM</text>
          </svg>
          <span class="brand__name-full">Dashboard</span>
        </a>

        <div class="dash-header__actions">
          <span class="dash-user" id="welcomeUser"></span>
          <a href="index.html" target="_blank" rel="noopener" class="btn btn--secondary">View website</a>
          <button id="logoutBtn" class="btn btn--secondary">Log out</button>
        </div>
      </div>
    </header>

    <main class="dash-main" style="max-width: 1180px;">
      <a href="dashboard.html" class="section__link" style="display:inline-block; margin-bottom: 1.5rem;">&larr; back to dashboard</a>

      <div style="margin-bottom: 1.75rem;">
        <p class="eyebrow" id="pageEyebrow">publish</p>
        <h1 id="pageHeading" style="font-family: var(--font-display); font-size: clamp(1.6rem, 3vw, 2.1rem); font-weight: 700;">New Blog Post</h1>
        <p id="pageSubtext" style="margin-top: 0.4rem; color: var(--color-text-muted); font-size: 0.92rem;">Write a blog post for the homepage. This is completely separate from your diary entries.</p>
      </div>

      <p class="publish-success" id="publishSuccess">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="publishSuccessText">Blog post published successfully. Redirecting to the homepage…</span>
      </p>
      <p id="formError" class="form-error" hidden></p>

      <form id="newBlogForm" novalidate>
        <div class="blog-editor-layout">
          <!-- Main column: title + toolbar + editor -->
          <div>
            <div class="form-field form-field--full">
              <input type="text" id="blogTitle" required minlength="3" maxlength="150" placeholder="Post title" style="font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; padding: 0.6rem 0; border: none; border-bottom: 1px solid var(--color-border); border-radius: 0; background: transparent;" />
            </div>

            <div class="editor-toolbar" id="editorToolbar">
              <div class="editor-toolbar__group">
                <button type="button" class="toolbar-btn" data-cmd="bold" title="Bold"><b>B</b></button>
                <button type="button" class="toolbar-btn" data-cmd="italic" title="Italic"><i>I</i></button>
                <button type="button" class="toolbar-btn" data-cmd="underline" title="Underline"><u>U</u></button>
              </div>
              <div class="editor-toolbar__group">
                <button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="h1" title="Heading 1">H1</button>
                <button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="h2" title="Heading 2">H2</button>
                <button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="h3" title="Heading 3">H3</button>
                <button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="p" title="Paragraph">¶</button>
              </div>
              <div class="editor-toolbar__group">
                <button type="button" class="toolbar-btn" data-cmd="insertUnorderedList" title="Bullet list">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="4" cy="6" r="1.4" fill="currentColor"/><circle cx="4" cy="12" r="1.4" fill="currentColor"/><circle cx="4" cy="18" r="1.4" fill="currentColor"/><path d="M9 6h11M9 12h11M9 18h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <button type="button" class="toolbar-btn" data-cmd="insertOrderedList" title="Numbered list">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 6h11M9 12h11M9 18h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><text x="1" y="8" font-size="7" fill="currentColor">1</text><text x="1" y="14" font-size="7" fill="currentColor">2</text><text x="1" y="20" font-size="7" fill="currentColor">3</text></svg>
                </button>
                <button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="blockquote" title="Blockquote">&rdquo;</button>
              </div>
              <div class="editor-toolbar__group">
                <button type="button" class="toolbar-btn" id="btnCodeBlock" title="Code block">&lt;/&gt;</button>
                <button type="button" class="toolbar-btn" id="btnLink" title="Insert link">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 15l6-6M10 6l1-1a4 4 0 015.5 5.5l-1.5 1.5M14 18l-1 1a4 4 0 01-5.5-5.5l1.5-1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <button type="button" class="toolbar-btn" id="btnImage" title="Insert image">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2"/><circle cx="8.5" cy="9.5" r="1.5" fill="currentColor"/><path d="M21 16l-5-5-9 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button type="button" class="toolbar-btn" id="btnVideo" title="Embed video">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="5" width="15" height="14" rx="2" stroke="currentColor" stroke-width="2"/><path d="M22 8l-5 3 5 3V8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
                </button>
                <button type="button" class="toolbar-btn" id="btnTable" title="Insert table">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="16" rx="1" stroke="currentColor" stroke-width="2"/><path d="M3 10h18M3 16h18M9 4v16" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button type="button" class="toolbar-btn" id="btnHr" title="Horizontal rule">&mdash;</button>
              </div>
              <div class="editor-toolbar__group">
                <button type="button" class="toolbar-btn" id="btnUndo" title="Undo">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 14L4 9l5-5M4 9h10a6 6 0 010 12h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </div>
            <div id="editorCanvas" class="editor-canvas" contenteditable="true" data-placeholder="Start writing your post…"></div>
            <p class="field-hint" id="wordStats" style="margin-top: 0.6rem;">0 words · 1 min read</p>
          </div>

          <!-- Sidebar: cover image, category, tags, excerpt, actions -->
          <aside class="blog-editor-sidebar">
            <div>
              <h3>Cover image</h3>
              <label class="blog-cover-upload" for="coverImageInput">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin: 0 auto 0.4rem; color: var(--color-text-faint);"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2"/><circle cx="8.5" cy="9.5" r="1.5" fill="currentColor"/><path d="M21 16l-5-5-9 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="field-hint" style="margin:0;">Click to upload a cover image</span>
                <input type="file" id="coverImageInput" accept="image/png,image/jpeg,image/webp,image/gif" />
              </label>
              <img id="coverImagePreview" class="blog-cover-preview" alt="Cover image preview" />
              <button type="button" id="removeCoverBtn" class="btn btn--secondary blog-cover-remove">Remove cover</button>
            </div>

            <div class="form-field form-field--full" style="margin-bottom:0;">
              <label for="blogCategory">Category</label>
              <input type="text" id="blogCategory" placeholder="e.g. Tutorials" />
            </div>

            <div class="form-field form-field--full" style="margin-bottom:0;">
              <label for="blogTags">Tags (comma separated)</label>
              <input type="text" id="blogTags" placeholder="nodejs, career, tips" />
            </div>

            <div class="form-field form-field--full" style="margin-bottom:0;">
              <label for="blogExcerpt">Excerpt (optional)</label>
              <textarea id="blogExcerpt" maxlength="300" placeholder="Short summary shown on cards — auto-generated if left blank" style="min-height: 90px;"></textarea>
            </div>

            <div style="display:flex; flex-direction:column; gap:0.6rem; margin-top: 0.5rem;">
              <button type="button" id="previewBtn" class="btn btn--secondary btn--block">Preview</button>
              <button type="submit" id="saveDraftBtn" class="btn btn--secondary btn--block" data-status="draft">Save Draft</button>
              <button type="submit" id="publishBtn" class="btn btn--primary btn--block" data-status="published">Publish</button>
            </div>
          </aside>
        </div>
      </form>
    </main>
  </div>

  <!-- Preview modal -->
  <div class="modal-overlay" id="previewModal">
    <div class="modal-card blog-preview-card" role="dialog" aria-modal="true">
      <button class="modal-close" aria-label="Close">&times;</button>
      <p class="modal-card__meta" id="previewMeta"></p>
      <h2 id="previewTitle"></h2>
      <div class="blog-content" id="previewBody"></div>
    </div>
  </div>

  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/new-blog.js" defer></script>
</body>
</html>
