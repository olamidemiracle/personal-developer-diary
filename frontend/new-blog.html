<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07070b" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='10' fill='%23121218'/%3E%3Ctext x='20' y='26' font-family='sans-serif' font-size='15' font-weight='700' fill='%232f7dfd' text-anchor='middle'%3EOM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>New Blog Post — Olamide Miracle</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/public.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <!-- Shown until the auth check resolves, so protected content never flashes -->
  <div class="dash-loading" id="authGate">
    <span class="spinner"></span> checking session…
  </div>

  <div id="pageRoot" hidden>
    <header class="dash-header">
      <div class="dash-header__inner">
        <a href="dashboard.html" class="brand">
          <svg class="brand__logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Olamide Miracle logo">
            <rect x="1" y="1" width="38" height="38" rx="10" fill="#121218" stroke="#2f7dfd" stroke-width="1.5" />
            <text x="20" y="26" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" fill="#2f7dfd" text-anchor="middle">OM</text>
          </svg>
          <span class="brand__name-full">Dashboard</span>
        </a>

        <div class="dash-header__actions">
          <span class="dash-user" id="welcomeUser"></span>
          <a href="index.html" target="_blank" rel="noopener" class="btn btn--secondary">View website</a>
          <button id="logoutBtn" class="btn btn--secondary">Log out</button>
        </div>
      </div>
    </header>

    <main class="dash-main">
      <a href="dashboard.html" class="section__link" style="display:inline-block; margin-bottom: 1.5rem;">&larr; back to dashboard</a>

      <div class="entry-page-card reveal">
        <div class="entry-page-header">
          <p class="eyebrow" id="pageEyebrow">publish</p>
          <h1 id="pageHeading">New Blog Post</h1>
          <p id="pageSubtext">Write a blog post for the homepage. This is separate from your diary entries.</p>
        </div>

        <p class="publish-success" id="publishSuccess">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="publishSuccessText">Blog post published successfully. Redirecting to the homepage…</span>
        </p>

        <form id="newBlogForm" novalidate>
          <div class="form-field form-field--full">
            <label for="blogTitle">Title</label>
            <input type="text" id="blogTitle" required minlength="3" maxlength="150" placeholder="Give your post a title" />
          </div>

          <div class="form-field form-field--full">
            <label for="blogContent">Content</label>
            <textarea id="blogContent" required placeholder="Write your post…" style="min-height: 420px;"></textarea>
          </div>

          <p id="formError" class="form-error" hidden></p>

          <div class="form-actions">
            <a href="dashboard.html" class="btn btn--secondary">Cancel</a>
            <button type="submit" class="btn btn--primary" id="publishBtn">Publish</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="js/utils.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/new-blog.js" defer></script>
</body>
</html>
